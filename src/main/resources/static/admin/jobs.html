<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Должности</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="/js/common.js"></script><script src="/js/crud.js"></script>
</head>
<body>
<div id="header-container"></div>
<div class="container mt-4">
    <div id="crud-alert"></div>
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>💼 Справочник должностей</h2>
        <button class="btn btn-success" onclick="CrudManager.openModal('create')">➕ Добавить</button>
    </div>
    <table class="table table-hover"><thead class="table-dark"><tr><th>Название</th><th>Оклад (₽)</th><th>Действия</th></tr></thead><tbody id="crud-tbody"></tbody></table>
</div>
<div class="modal fade" id="crud-modal" tabindex="-1">
    <div class="modal-dialog"><div class="modal-content">
        <div class="modal-header"><h5 class="modal-title" id="crud-modal-title"></h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
        <div class="modal-body">
            <form id="crud-form" class="needs-validation" novalidate>
                <div class="mb-3"><label class="form-label">Название *</label><input type="text" name="name" class="form-control" required></div>
                <div class="mb-3"><label class="form-label">Оклад *</label><input type="number" step="0.01" name="salary" class="form-control" required></div>
            </form>
        </div>
        <div class="modal-footer"><button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Отмена</button><button type="button" class="btn btn-primary" onclick="CrudManager.saveItem()">💾 Сохранить</button></div>
    </div></div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    CrudManager.init({
        apiUrl: '/api/job-titles', entityName: 'должности',
        columns: [{field:'name', label:'Название'}, {field:'salary', label:'Оклад'}],
        fields: [{key:'name', type:'text'}, {key:'salary', type:'number'}],
        data: [], cache: {}
    });
</script>
</body>
</html>

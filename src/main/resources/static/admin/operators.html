<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Туроператоры</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="/js/common.js"></script><script src="/js/crud.js"></script>
</head>
<body>
<div id="header-container"></div><div class="container mt-4">
    <div id="crud-alert"></div>
    <div class="d-flex justify-content-between align-items-center mb-3"><h2>🏢 Туроператоры</h2><button class="btn btn-success" onclick="CrudManager.openModal('create')">➕ Добавить</button></div>
    <table class="table table-hover"><thead class="table-dark"><tr><th>Компания</th><th>ИНН</th><th>Рейтинг</th><th>Email</th><th>Действия</th></tr></thead><tbody id="crud-tbody"></tbody></table>
</div>
<div class="modal fade" id="crud-modal" tabindex="-1">
    <div class="modal-dialog modal-lg"><div class="modal-content">
        <div class="modal-header"><h5 class="modal-title" id="crud-modal-title"></h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
        <div class="modal-body">
            <form id="crud-form" class="needs-validation" novalidate>
                <div class="row">
                    <div class="col-md-6 mb-3"><label class="form-label">Название *</label><input type="text" name="companyName" class="form-control" required></div>
                    <div class="col-md-6 mb-3"><label class="form-label">ИНН *</label><input type="text" name="inn" class="form-control" pattern="\d{10,12}" required></div>
                </div>
                <div class="row">
                    <div class="col-md-6 mb-3"><label class="form-label">Контактное лицо</label><input type="text" name="contactPerson" class="form-control"></div>
                    <div class="col-md-6 mb-3"><label class="form-label">Телефон</label><input type="text" name="phone" class="form-control" pattern="\+7\d{11}"></div>
                </div>
                <div class="row">
                    <div class="col-md-6 mb-3"><label class="form-label">Email *</label><input type="email" name="email" class="form-control" required></div>
                    <div class="col-md-6 mb-3"><label class="form-label">Рейтинг (0-10)</label><input type="number" step="0.01" min="0" max="10" name="rating" class="form-control"></div>
                </div>
                <div class="mb-3"><label class="form-label">Юридический адрес *</label><select id="select-address" name="address" class="form-select" required></select></div>
            </form>
        </div>
        <div class="modal-footer"><button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Отмена</button><button type="button" class="btn btn-primary" onclick="CrudManager.saveItem()">💾 Сохранить</button></div>
    </div></div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    CrudManager.init({
        apiUrl: '/api/tour-operators', entityName: 'туроператора',
        columns: [{field:'companyName', label:'Компания'}, {field:'inn', label:'ИНН'}, {field:'rating', label:'Рейтинг'}, {field:'email', label:'Email'}],
        fields: [{key:'companyName', type:'text'}, {key:'inn', type:'text'}, {key:'contactPerson', type:'text'}, {key:'phone', type:'text'}, {key:'email', type:'email'}, {key:'rating', type:'number'}, {key:'address', type:'select', isRelation:true}],
        relatedApis: { address: '/api/addresses' },
        loadRelated: true,
        data: [], cache: {}
    });
</script>
</body>
</html>

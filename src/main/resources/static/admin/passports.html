<!DOCTYPE html>
<html lang="ru">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Паспорта</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="/js/common.js"></script><script src="/js/crud.js"></script>
</head><body>
<div id="header-container"></div><div class="container mt-4">
    <div id="crud-alert"></div>
    <div class="d-flex justify-content-between align-items-center mb-3"><h2>📘 Паспортные данные</h2><button class="btn btn-success" onclick="CrudManager.openModal('create')">➕ Добавить</button></div>
    <table class="table table-hover"><thead class="table-dark"><tr><th>Серия</th><th>Номер</th><th>Дата выдачи</th><th>Кем выдан</th><th>Действия</th></tr></thead><tbody id="crud-tbody"></tbody></table>
</div>
<div class="modal fade" id="crud-modal" tabindex="-1"><div class="modal-dialog"><div class="modal-content">
    <div class="modal-header"><h5 class="modal-title" id="crud-modal-title"></h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
    <div class="modal-body"><form id="crud-form" class="needs-validation" novalidate>
        <div class="row mb-2"><div class="col"><label>Серия (4 зн.) *</label><input type="text" name="series" maxlength="4" pattern="\d{4}" class="form-control" required></div><div class="col"><label>Номер (6 зн.) *</label><input type="text" name="number" maxlength="6" pattern="\d{6}" class="form-control" required></div></div>
        <div class="mb-2"><label>Дата выдачи *</label><input type="date" name="issueDate" class="form-control" required></div>
        <div class="mb-2"><label>Кем выдан *</label><input type="text" name="issuedBy" class="form-control" required></div>
    </form></div>
    <div class="modal-footer"><button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Отмена</button><button type="button" class="btn btn-primary" onclick="CrudManager.saveItem()">💾 Сохранить</button></div>
</div></div></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    CrudManager.init({
        apiUrl: '/api/passports', entityName: 'паспорт',
        columns: [{field:'series', label:'Серия'},{field:'number', label:'Номер'},{field:'issueDate', label:'Дата'},{field:'issuedBy', label:'Кем выдан'}],
        fields: [{key:'series',type:'text'},{key:'number',type:'text'},{key:'issueDate',type:'date'},{key:'issuedBy',type:'text'}],
        data: [], cache: {}
    });
</script></body></html>

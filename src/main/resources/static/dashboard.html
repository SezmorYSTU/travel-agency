<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Панель управления</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="/js/common.js"></script>
</head>
<body>
<div id="header-container"></div>

<div class="container">
    <div id="alert-container"></div>

    <div class="text-center mt-5">
        <h1>👋 Добро пожаловать!</h1>
        <p class="lead">Загрузка панели управления...</p>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    async function checkAuth() {
        try {
            // 🔑 Обязательно отправляем куки сессии!
            const res = await fetch('/api/auth/me', {
                credentials: 'include',
                headers: { 'Accept': 'application/json' }
            });

            if (!res.ok) {
                console.error('Auth check failed:', res.status);
                throw new Error('Not authenticated');
            }

            const user = await res.json();
            console.log('✅ User loaded:', user);

            const routes = {
                'ADMIN': '/admin/index.html',
                'MANAGER': '/manager/index.html',
                'OPERATOR': '/operator/index.html'
            };

            const target = routes[user.role] || '/403.html';
            console.log('🔄 Redirecting to:', target);
            window.location.href = target;

        } catch (e) {
            console.error('❌ Auth check error:', e);
            // Показываем сообщение вместо бесконечной загрузки
            const lead = document.querySelector('.lead');
            if (lead) {
                lead.innerHTML = `<span class="text-danger">⚠️ Ошибка загрузки. <a href="/login.html">Войти снова</a></span>`;
            }
        }
    }

    // Запускаем после загрузки DOM
    document.addEventListener('DOMContentLoaded', checkAuth);
</script>
</body>
</html>

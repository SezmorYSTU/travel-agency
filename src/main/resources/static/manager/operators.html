<!DOCTYPE html>
<html lang="ru">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Туроператоры</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="/js/common.js"></script><script src="/js/crud.js"></script>
</head><body>
<div id="header-container"></div><div class="container mt-4">
    <div id="crud-alert"></div>
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>🏢 Туроператоры</h2>
        <!-- Кнопка "Добавить" скрыта для менеджера -->
    </div>
    <table class="table table-hover align-middle"><thead class="table-dark"><tr>
        <th>Компания</th><th>ИНН</th><th>Контакт</th><th>Телефон</th><th>Рейтинг</th><th>Город</th>
    </tr></thead><tbody id="crud-tbody"></tbody></table>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    CrudManager.init({
        apiUrl: '/api/tour-operators',
        entityName: 'туроператора',
        columns: [
            { field: 'companyName', label: 'Компания' },
            { field: 'inn', label: 'ИНН' },
            { field: 'contactPerson', label: 'Контакт' },
            { field: 'phone', label: 'Телефон' },
            { field: 'rating', label: 'Рейтинг' },
            { field: 'address.city', label: 'Город' }
        ],
        fields: [], // Пустой, так как форма не используется
        relatedApis: { address: '/api/addresses' },
        // Менеджер: только чтение (нет кнопок создания/редактирования/удаления)
        hideCreate: true,
        hideEdit: true,
        hideDelete: true,
        data: [],
        cache: {}
    });
</script></body></html>

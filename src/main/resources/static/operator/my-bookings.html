<!DOCTYPE html>
<html lang="ru">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мои бронирования</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="/js/common.js"></script><script src="/js/crud.js"></script>
</head><body>
<div id="header-container"></div><div class="container mt-4">
    <div id="crud-alert"></div>
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>📋 Мои бронирования</h2>
        <!-- Оператор: нет кнопки "Добавить" -->
    </div>
    <div class="alert alert-info py-2">
        <small>Отображаются только брони по вашим турам</small>
    </div>
    <table class="table table-hover align-middle"><thead class="table-dark"><tr>
        <th>Договор</th><th>Клиент</th><th>Тур</th><th>Дата</th><th>Статус</th><th>Сумма</th>
    </tr></thead><tbody id="crud-tbody"></tbody></table>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    CrudManager.init({
        apiUrl: '/api/bookings',
        entityName: 'бронирование',
        columns: [
            { field: 'contractNumber', label: 'Договор' },
            { field: 'client.fullName', label: 'Клиент' },
            { field: 'tour.name', label: 'Тур' },
            { field: 'bookingDate', label: 'Дата', format: 'date' },
            { field: 'status', label: 'Статус' },
            { field: 'totalAmount', label: 'Сумма', format: 'price' }
        ],
        fields: [], // Форма не используется
        hideCreate: true,
        hideEdit: true,
        hideDelete: true,
        data: [],
        cache: {}
    });
</script></body></html>

<!DOCTYPE html>
<html lang="ru">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мои туры</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="/js/common.js"></script><script src="/js/crud.js"></script>
</head><body>
<div id="header-container"></div><div class="container mt-4">
    <div id="crud-alert"></div>
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>🧭 Мои туры</h2>
        <!-- Оператор: нет кнопки "Добавить" -->
    </div>
    <div class="alert alert-info py-2">
        <small>Отображаются только туры вашего туроператора</small>
    </div>
    <table class="table table-hover align-middle"><thead class="table-dark"><tr>
        <th>Название</th><th>Страна</th><th>Город</th><th>Отель</th><th>Дата отправления</th><th>Дата прибытия</th><th>Стоимость</th><th>Мест</th>
    </tr></thead><tbody id="crud-tbody"></tbody></table>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    CrudManager.init({
        apiUrl: '/api/tours',
        entityName: 'тур',
        columns: [
            { field: 'name', label: 'Название' },
            { field: 'country', label: 'Страна' },
            { field: 'city', label: 'Город' },
            { field: 'hotel', label: 'Отель' },
            { field: 'startDate', label: 'Начало', format: 'date' },
            { field: 'endDate', label: 'Окончание', format: 'date' },
            { field: 'price', label: 'Стоимость', format: 'price' },
            { field: 'availableSeats', label: 'Мест' }
        ],
        fields: [], // Форма не используется
        // Оператор: только чтение (все кнопки скрыты)
        hideCreate: true,
        hideEdit: true,
        hideDelete: true,
        data: [],
        cache: {}
    });
</script></body></html>
